<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ข้อเสนอแนะ</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

/* แบนเนอร์ */
.header img{
    width:100%;
}

/* กล่องฟอร์ม */
.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

textarea{
    height:120px;
    resize:none;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    background:black;
    color:white;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#444;
}

.footer{
    background:black;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>

<script>
function sendFeedback(){
    alert("ขอบคุณสำหรับข้อเสนอแนะของคุณ 😊");
}
</script>

</head>

<body>

<div class="header"></div>

<div class="container">
    <h2>แบบฟอร์มข้อเสนอแนะ</h2>

    <label>ชื่อ-นามสกุล</label>
    <input type="text" placeholder="กรอกชื่อของคุณ">

    <label>อีเมล</label>
    <input type="email" placeholder="กรอกอีเมล">

    <label>ข้อเสนอแนะ / ความคิดเห็น</label>
    <textarea placeholder="พิมพ์ข้อความของคุณที่นี่"></textarea>

    <button onclick="sendFeedback()">ส่งข้อความ</button>
</div>

<div class="footer">
© 2026 Watch Shop | โทร 089-xxx-xxxx
</div>

</body>
</html>
