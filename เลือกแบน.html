<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ราคาแต่ละแบรนด์</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f4f4f4;
}

/* แบนเนอร์ */
.header img{
    width: 100%;
}

/* กล่องเลือกแบรนด์ */
.container{
    width: 400px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    text-align: center;
}

h2{
    margin-bottom: 20px;
}

select{
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background-color: black;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

button:hover{
    background-color: #444;
}

#result{
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: #b8860b;
}

.footer{
    margin-top: 40px;
    padding: 15px;
    background: black;
    color: white;
    text-align: center;
}
</style>

<script>
function showPrice(){
    var brand = document.getElementById("brand").value;
    var result = document.getElementById("result");

    if(brand == "Rolex"){
        result.innerHTML = "Rolex : 250,000 - 500,000 บาท";
    }
    else if(brand == "Omega"){
        result.innerHTML = "Omega : 150,000 - 300,000 บาท";
    }
    else if(brand == "Seiko"){
        result.innerHTML = "Seiko : 10,000 - 50,000 บาท";
    }
    else if(brand == "Casio"){
        result.innerHTML = "Casio : 2,000 - 15,000 บาท";
    }
    else{
        result.innerHTML = "กรุณาเลือกแบรนด์";
    }
}
</script>

</head>

<body>

<div class="header">
    <img src="รูป/แบน.png" alt="ราคาแต่ละแบรนด์">
</div>

<div class="container">
    <h2>เลือกราคาแต่ละแบรนด์</h2>

    <select id="brand">
        <option value="">-- เลือกแบรนด์ --</option>
        <option value="Rolex">Rolex</option>
        <option value="Omega">Omega</option>
        <option value="Seiko">Seiko</option>
        <option value="Casio">Casio</option>
    </select>

    <button onclick="showPrice()">แสดงราคา</button>

    <div id="result"></div>
</div>

<div class="footer">
© 2026 Watch Shop
</div>

</body>
</html>
