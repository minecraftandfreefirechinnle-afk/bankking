<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ร้านขายนาฬิกา</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f2f2f2;
}

/* แบนเนอร์ */
.header{
    background-color: #111;
    color: white;
    text-align: center;
    padding: 30px;
    font-size: 36px;
    letter-spacing: 3px;
}

/* หัวข้อ */
.section-title{
    text-align: center;
    font-size: 28px;
    margin: 30px 0;
}

/* กล่องสินค้า */
.product-container{
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    padding-bottom: 50px;
}

.product-card{
    background: white;
    width: 280px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    padding: 20px;
    text-align: center;
}

.product-card img{
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
}

.product-card h3{
    margin: 15px 0 10px 0;
}

.product-card p{
    color: #555;
    font-size: 14px;
}

.price{
    font-size: 20px;
    color: #b8860b;
    font-weight: bold;
    margin-top: 10px;
}

button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background-color: #000;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

button:hover{
    background-color: #444;
}

/* Footer */
.footer{
    background-color: #111;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<div class="header">
    LUXURY WATCH SHOP
</div>

<div class="section-title">สินค้านาฬิกาแนะนำ</div>

<div class="product-container">

    <div class="product-card"><img src="รูป/ภาพ3.jpg" width="2048" height="2048" alt=""/>
      <h3>Classic Silver</h3>
        <p>ดีไซน์เรียบหรู สายสแตนเลส แข็งแรงทนทาน</p>
        <div class="price">฿2,990</div>
        <button>สั่งซื้อ</button>
  </div>

    <div class="product-card"><img src="รูป/ภาพ4.jpg" width="1000" height="1000" alt=""/>
      <h3>Sport Black</h3>
        <p>สปอร์ต เท่ กันน้ำ เหมาะกับทุกกิจกรรม</p>
        <div class="price">฿3,490</div>
        <button>สั่งซื้อ</button>
  </div>

    <div class="product-card"><img src="รูป/ภาพ5.jpg" width="205" height="246" alt=""/>
      <h3>Gold Premium</h3>
        <p>หรูหรา สายหนังแท้ ใส่ออกงานได้</p>
        <div class="price">฿4,990</div>
        <button>สั่งซื้อ</button>
  </div>

</div>

<div class="footer">
    © 2026 Watch Shop | ติดต่อ 089-xxx-xxxx
</div>

</body>
</html>
