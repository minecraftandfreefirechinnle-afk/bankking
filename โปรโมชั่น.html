<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Promotion</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f5f5f5;
}

.header{
    width: 100%;
}

/* กล่องแจ้งเตือน */
.alert{
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a9d8f;
    color: white;
    padding: 15px 25px;
    border-radius: 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: none;
    font-weight: bold;
    z-index: 1000;
}

.promo-section{
    padding: 40px;
    text-align: center;
}

.promo-title{
    font-size: 36px;
    color: #d62828;
    margin-bottom: 10px;
}

.promo-subtitle{
    font-size: 18px;
    color: #555;
    margin-bottom: 30px;
}

.promo-container{
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.promo-card{
    background: white;
    width: 300px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.promo-card img{
    width: 100%;
    border-radius: 10px;
}

.promo-card h3{
    color: #003049;
}

.promo-card p{
    color: #444;
}

.price{
    font-size: 22px;
    color: #d62828;
    font-weight: bold;
    margin-top: 10px;
}

button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background-color: #f77f00;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background-color: #d62828;
}
</style>

<script>
function orderSuccess(productName){

 
    let orders = JSON.parse(localStorage.getItem("orders")) || [];


    orders.push(productName);

  
    localStorage.setItem("orders", JSON.stringify(orders));


}

function MM_preloadImages() { //v3.0
  var d=document; if(d.images){ if(!d.MM_p) d.MM_p=new Array();
    var i,j=d.MM_p.length,a=MM_preloadImages.arguments; for(i=0; i<a.length; i++)
    if (a[i].indexOf("#")!=0){ d.MM_p[j]=new Image; d.MM_p[j++].src=a[i];}}
}
</script>

</head>

<body onLoad="MM_preloadImages('file:///C|/091/แนะนำ (1).png','file:///C|/091/price5 (1).png','file:///C|/091/pay8 (1).png','file:///C|/091/cont9 (1).png','file:///C|/091/sug10 (1).png')">
<a href="index.html"><img src="รูป/pro1.png" alt="Promotion Banner" width="152%" height="428" class="header"></a>

<div class="promo-section">
    <div class="promo-title">
      <p>&nbsp;</p>
      <p></p>
    </div>
    <div class="promo-subtitle">
      <p>โปรโมชั่นพิเศษ</p>
      <p>เฉพาะเดือนนี้เท่านั้น รีบสั่งก่อนหมดเขต!</p>
    </div>

    <div class="promo-container">

        <div class="promo-card">
            <img src="รูป/ภาพ.jpg" alt="">
            <h3>ชุดสุดคุ้ม A</h3>
            <p>อาหารครบชุด พร้อมเครื่องดื่ม</p>
            <div class="price">฿199</div>
            <button onclick="orderSuccess('ชุดสุดคุ้ม A')">สั่งซื้อ</button>
        </div>

        <div class="promo-card">
            <img src="รูป/ภาพ1.jpg" alt="">
            <h3>ซื้อ 1 แถม 1</h3>
            <p>เฉพาะเมนูที่ร่วมรายการ</p>
            <div class="price">เริ่มต้น ฿99</div>
            <button onclick="orderSuccess('ซื้อ 1 แถม 1')">สั่งซื้อ</button>
        </div>

        <div class="promo-card">
            <img src="รูป/ภาพ2.jpg" alt="">
            <h3>ลด 50%</h3>
            <p>เมื่อสั่งครบ 500 บาทขึ้นไป</p>
            <div class="price">วันนี้เท่านั้น</div>
            <button onclick="orderSuccess('ลด 50%')">รับสิทธิ์</button>
        </div>

    </div>
</div>

</body>
</html>
